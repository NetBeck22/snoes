
<!DOCTYPE html>
<html lang="nl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SNOES.</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
}

body{
    background:#0f0f0f;
    color:white;
    min-height:100vh;
}


/* Logo */

header{
    padding:25px;
    font-size:30px;
    font-weight:800;
    letter-spacing:-1px;
}


/* Hoofdgedeelte */

main{
    padding:10px 24px 50px;
}

.hero h1{
    font-size:42px;
    margin-bottom:10px;
    letter-spacing:-1px;
}

.hero p{
    color:#aaa;
    font-size:16px;
    line-height:1.5;
    margin-bottom:25px;
}


/* Play knop */

.play{
    background:white;
    color:black;
    border:none;
    padding:15px 25px;
    border-radius:8px;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    margin-bottom:25px;
}

.play:active{
    transform:scale(.97);
}


/* Video */

.video-box{
    display:none;
}

video{
    width:100%;
    border-radius:16px;
}


/* Afleveringen */

.section{
    margin-top:40px;
}

.section h2{
    font-size:20px;
    margin-bottom:15px;
}


.episode{
    background:#1c1c1c;
    border-radius:14px;
    padding:18px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:12px;
}


.locked{
    opacity:.45;
}


/* Footer */

footer{
    padding:30px 24px;
    color:#666;
    font-size:14px;
}

</style>

</head>


<body>


<header>
SNOES.
</header>


<main>


<div class="hero">

<h1>Aflevering 1</h1>

<p>
Een exclusieve serie gemaakt voor één speciale kijker ❤️
</p>


<button class="play" onclick="openVideo()">
▶ Aflevering bekijken
</button>


<div class="video-box" id="videoBox">

<iframe 
src="https://www.youtube.com/embed/vHCuLG50raw?si=yxJJ4TBzM2G_-HUK"
width="100%"
height="300"
frameborder="0"
allowfullscreen>
</iframe>

</div>


</div>



<div class="section">

<h2>Afleveringen</h2>


<div class="episode">

<span>
Aflevering 1
</span>

<span>
▶
</span>

</div>



<div class="episode locked">

<span>
Volgende aflevering
</span>

<span>
🔒
</span>

</div>


<div class="episode locked">

<span>
Nog meer SNOES.
</span>

<span>
🔒
</span>

</div>


</div>


</main>



<footer>

Wordt vervolgd...

</footer>



<script>

function openVideo(){

    let video = document.getElementById("videoBox");

    video.style.display = "block";

}

</script>


</body>

</html>
