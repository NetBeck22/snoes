
<!DOCTYPE html>
<html lang="nl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SNOES.</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
}

body{
    background:#0f0f0f;
    color:white;
    min-height:100vh;
}


/* Logo */

header{
    padding:25px;
    font-size:30px;
    font-weight:800;
    letter-spacing:-1px;
}


/* Hoofdgedeelte */

main{
    padding:10px 24px 50px;
}

.hero h1{
    font-size:42px;
    margin-bottom:10px;
    letter-spacing:-1px;
}

.hero p{
    color:#aaa;
    font-size:16px;
    line-height:1.5;
    margin-bottom:25px;
}


/* Play knop */

.play{
    background:white;
    color:black;
    border:none;
    padding:15px 25px;
    border-radius:8px;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    margin-bottom:25px;
}

.play:active{
    transform:scale(.97);
}


/* Video */

.video-box{
    display:none;
}

video{
    width:100%;
    border-radius:16px;
}


/* Afleveringen */

.section{
    margin-top:40px;
}

.section h2{
    font-size:20px;
    margin-bottom:15px;
}


.episode{
    background:#1c1c1c;
    border:none;
    color:white;
    border-radius:14px;
    padding:18px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:12px;
    width:100%;
    cursor:pointer;
    text-align:left;
}

.episode:hover{
    background:#2a2a2a;
}

.episode.active{
    background:#2e6bff;
}


/* Footer */

footer{
    padding:30px 24px;
    color:#666;
    font-size:14px;
}

</style>

</head>


<body>


<header>
SNOES.
</header>


<main>


<div class="hero">

<h1 id="heroTitle">Aflevering 1 : De Rugzak</h1>

<p id="heroDescription">
Een exclusieve serie gemaakt voor één speciale kijker ❤️
</p>


<button class="play" onclick="openVideo()">
▶ Aflevering bekijken
</button>


<div class="video-box" id="videoBox">

<iframe id="videoFrame"
src="https://www.youtube.com/embed/6XY1dQC1er0?si=IYvEZBTuycXRdPBt"
width="100%"
height="300"
frameborder="0"
allowfullscreen>
</iframe>

</div>


</div>



<div class="section">

<h2>Afleveringen</h2>


<button class="episode active" id="episodeButton1" onclick="selectEpisode(1)">

<span>
Aflevering 1 : De Rugzak
</span>

<span>
▶
</span>

</button>


<button class="episode" id="episodeButton2" onclick="selectEpisode(2)">

<span>
Aflevering 2 : Nieuwe aflevering
</span>

<span>
▶
</span>

</button>




</div>


</main>



<footer>

Wordt vervolgd... Ik zie je graag!! ❤️

</footer>



<script>

const episodes = {
    1: {
        title: "Aflevering 1 : De Rugzak",
        description: "Een exclusieve serie gemaakt voor één speciale kijker ❤️",
        videoUrl: "https://www.youtube.com/embed/6XY1dQC1er0?si=IYvEZBTuycXRdPBt"
    },
    2: {
        title: "Aflevering 2 : Het Onderzoek",
        description: "Dat ik je mis!",
        videoUrl: "https://www.youtube.com/embed/eDGDIMkvjjI?si=WvaMTQze8ETeG8JV"
    }
};

function openVideo(){

    let video = document.getElementById("videoBox");

    video.style.display = "block";

}

function selectEpisode(episodeNumber){

    const episode = episodes[episodeNumber];

    document.getElementById("heroTitle").textContent = episode.title;
    document.getElementById("heroDescription").textContent = episode.description;
    document.getElementById("videoFrame").src = episode.videoUrl;

    document.querySelectorAll(".episode").forEach(button => {
        button.classList.toggle("active", button.id === `episodeButton${episodeNumber}`);
    });

    openVideo();

}

selectEpisode(1);

</script>


</body>

</html>
